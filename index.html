<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f5ec;
      --muted: #c5ccd6;
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(10, 16, 24, 0.72);
      --accent: #f0c95a;
      --fresh: #68d8c2;
      --sky: #87bfff;
      --rose: #f58da6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(240, 201, 90, 0.18), transparent 32%),
        linear-gradient(225deg, rgba(104, 216, 194, 0.15), transparent 36%),
        #0b1118;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 86%);
      pointer-events: none;
    }

    main {
      width: min(920px, calc(100vw - 32px));
      min-height: min(620px, calc(100vh - 32px));
      display: grid;
      align-content: center;
      gap: 34px;
      padding: clamp(28px, 7vw, 72px);
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.035)),
        var(--panel);
      box-shadow: 0 32px 110px rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(18px);
      isolation: isolate;
    }

    .sparkline {
      position: absolute;
      inset: 22px 22px auto auto;
      display: flex;
      gap: 9px;
      align-items: end;
      height: 44px;
    }

    .sparkline span {
      width: 7px;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.82;
      animation: lift 1.8s ease-in-out infinite;
    }

    .sparkline span:nth-child(2) {
      height: 30px;
      background: var(--fresh);
      animation-delay: 0.15s;
    }

    .sparkline span:nth-child(3) {
      height: 42px;
      background: var(--sky);
      animation-delay: 0.3s;
    }

    .sparkline span:nth-child(4) {
      height: 24px;
      background: var(--rose);
      animation-delay: 0.45s;
    }

    .sparkline span:first-child {
      height: 20px;
    }

    .eyebrow {
      width: fit-content;
      margin: 0;
      padding: 9px 13px;
      border: 1px solid rgba(240, 201, 90, 0.44);
      border-radius: 999px;
      color: #ffe6a0;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(240, 201, 90, 0.1);
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(4rem, 13vw, 9rem);
      line-height: 0.86;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px rgba(248, 245, 236, 0.72);
      text-shadow: none;
    }

    p {
      max-width: 610px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.24rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    a {
      min-height: 48px;
      display: inline-grid;
      place-items: center;
      padding: 0 20px;
      border-radius: 8px;
      color: #071118;
      background: var(--accent);
      font-weight: 850;
      text-decoration: none;
      box-shadow: 0 14px 34px rgba(240, 201, 90, 0.2);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(240, 201, 90, 0.28);
      outline: none;
    }

    .tag {
      color: #dfe7ef;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92rem;
      opacity: 0.84;
    }

    @keyframes lift {
      0%, 100% {
        transform: scaleY(0.74);
      }

      50% {
        transform: scaleY(1.08);
      }
    }

    @media (max-width: 620px) {
      main {
        min-height: calc(100vh - 24px);
        padding-top: 82px;
      }

      .sparkline {
        inset: 24px auto auto 28px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="sparkline" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <p class="eyebrow">Tiny page, fancy mood</p>
    <h1>Hello <span>World</span></h1>
    <p>A clean little welcome screen with polished type, soft motion, and enough sparkle to make a two-word page feel intentional.</p>

    <div class="actions">
      <a href="Aboutus.html">Explore</a>
      <span class="tag">&lt;html&gt; alive and glowing &lt;/html&gt;</span>
    </div>
  </main>
</body>
</html>
